<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex space-x-8">
                    <span class="text-xl font-black text-blue-600 tracking-tighter">STORE</span>
                    <a href="index.html" class="text-gray-900 font-semibold hover:text-blue-600 px-3 py-2 rounded-md transition-colors">Home</a>
                </div>
                <a href="cart.html" class="bg-blue-600 text-white px-5 py-2 rounded-full font-medium transition-colors flex items-center gap-2">
                    🛒 Cart
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 mb-8">Shopping Cart</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <div id="cart-container" class="flex-1 space-y-4"></div>
            
            <div class="w-full lg:w-80 h-fit bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                <h3 class="text-lg font-bold border-b pb-4 mb-4">Order Summary</h3>
                <div id="bill-summary"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
